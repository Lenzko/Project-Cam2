<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accurate Digit Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
}


.camera{

position:relative;

width:95%;
max-width:700px;

margin:auto;

overflow:hidden;

border-radius:20px;

}


video{

width:100%;

}



#target{

position:absolute;

width:45%;
height:20%;

left:27.5%;
top:40%;

border:4px solid #00ff00;

box-sizing:border-box;

}



#hasil{

font-size:40px;

margin:20px;

}



#info{

color:#00ff00;

font-size:18px;

}



button{

width:90px;
height:90px;

font-size:40px;

border-radius:50%;

}



canvas{

display:none;

}


</style>

</head>



<body>


<h2>📷 Accurate Digit Scanner</h2>



<div class="camera">


<video id="video" autoplay playsinline></video>


<div id="target"></div>


</div>



<div id="hasil">
-
</div>



<div id="info">
Tekan kamera
</div>



<button onclick="start()">
📷
</button>



<canvas id="canvas"></canvas>





<script>


const SHEET_URL =
"https://script.google.com/macros/s/AKfycbzUjVh_iKrtbDJ1TzoN-xdWG110bTAV8IWwVZA8qSkOYINaM1rsHXVF4eBivrU0MOUm/exec";



const video =
document.getElementById("video");


const canvas =
document.getElementById("canvas");


const hasil =
document.getElementById("hasil");


const info =
document.getElementById("info");



let worker;

let aktif=false;







async function start(){


if(aktif)return;



let stream =
await navigator.mediaDevices.getUserMedia({


video:{


facingMode:"environment",

width:{
ideal:1920
},

height:{
ideal:1080
}


}


});



video.srcObject=stream;



video.onloadedmetadata=async()=>{



worker =
await Tesseract.createWorker("eng");



await worker.setParameters({

tessedit_char_whitelist:
"0123456789",

});



aktif=true;



scan();


};


}








async function scan(){



while(aktif){



let mulai =
Date.now();



info.innerHTML =
"📷 Mengambil gambar...";



let best=null;



// ambil 3 gambar untuk voting

for(let i=0;i<3;i++){


info.innerHTML =
"🔍 Memproses gambar "+(i+1)+"/3";


let r =
await capture();



if(
r &&
(!best ||
r.confidence > best.confidence)
){

best=r;

}



await sleep(500);


}






if(best){


hasil.innerHTML =
"Angka : "+best.angka;



info.innerHTML =
"✅ Terdeteksi | kirim data";



sendSheet(best);



}else{


hasil.innerHTML =
"Angka : -";


info.innerHTML =
"⚠️ Tidak terbaca, ulang";


}





let waktu =
Date.now()-mulai;


let tunggu =
60000-waktu;



if(tunggu<300)
tunggu=300;



info.innerHTML =
"⏳ Scan berikutnya 1 menit";


await sleep(tunggu);



}



}









async function capture(){



canvas.width =
video.videoWidth;


canvas.height =
video.videoHeight;



let ctx =
canvas.getContext("2d");



ctx.drawImage(

video,

0,

0,

canvas.width,

canvas.height

);





// ===== AREA SCAN KECIL =====


let crop =
document.createElement("canvas");


let c =
crop.getContext("2d");



let w =
canvas.width*0.45;


let h =
canvas.height*0.20;



crop.width=w;

crop.height=h;



c.drawImage(

canvas,

canvas.width*0.275,

canvas.height*0.40,

w,

h,

0,

0,

w,

h

);






// ===== PIXEL PROCESS =====


let img =
c.getImageData(

0,

0,

w,

h

);



let d =
img.data;



let total=0;



for(
let i=0;
i<d.length;
i+=4
){


let gray =

0.299*d[i]+
0.587*d[i+1]+
0.114*d[i+2];


total+=gray;


}



let avg =
total/(d.length/4);






for(
let i=0;
i<d.length;
i+=4
){



let gray =

0.299*d[i]+
0.587*d[i+1]+
0.114*d[i+2];



let value =
gray>avg
?
255
:
0;



d[i]=value;

d[i+1]=value;

d[i+2]=value;



}





c.putImageData(

img,

0,

0

);







// ===== PERBESAR =====


let big =
document.createElement("canvas");



big.width =
crop.width*6;


big.height =
crop.height*6;



let b =
big.getContext("2d");



b.imageSmoothingEnabled=false;



b.drawImage(

crop,

0,

0,

big.width,

big.height

);






// ===== OCR =====


let data =
await worker.recognize(big);





let best="";

let conf=0;



data.data.words.forEach(w=>{


let angka =
w.text.replace(
/[^0-9]/g,
""
);



if(

angka &&

w.confidence>conf

){


best=angka;

conf=w.confidence;


}



});






if(

best &&

conf>=65

){


return{

angka:best,

confidence:conf

};


}



return null;


}







function sendSheet(data){



fetch(

SHEET_URL,

{

method:"POST",

mode:"no-cors",

headers:{

"Content-Type":"text/plain"

},


body:JSON.stringify(data)


}

);



}







function sleep(ms){

return new Promise(

r=>setTimeout(r,ms)

);

}




</script>


</body>

</html>

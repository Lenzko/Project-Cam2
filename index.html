<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>High Accuracy Digit Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
}


.camera{

position:relative;

width:95%;
max-width:700px;

margin:auto;

overflow:hidden;

border-radius:20px;

}


video{

width:100%;

}



#target{

position:absolute;

width:75%;
height:35%;

left:12.5%;
top:32%;

border:4px solid #00ff00;

}



#result{

font-size:40px;

margin:20px;

}



#info{

color:#00ff00;

}



button{

width:90px;
height:90px;

font-size:40px;

border-radius:50%;

}



canvas{
display:none;
}


</style>

</head>


<body>


<h2>📷 AI Digit Scanner</h2>



<div class="camera">


<video id="video" autoplay playsinline></video>


<div id="target"></div>


</div>



<div id="result">
-
</div>


<div id="info">
Tekan kamera
</div>



<button onclick="startCamera()">
📷
</button>



<canvas id="canvas"></canvas>




<script>


const video =
document.getElementById("video");


const canvas =
document.getElementById("canvas");


const result =
document.getElementById("result");


const info =
document.getElementById("info");



let worker;

let aktif=false;



let retry=0;





async function startCamera(){


if(aktif)return;



let stream =
await navigator.mediaDevices.getUserMedia({


video:{


facingMode:"environment",


width:{
ideal:1920
},


height:{
ideal:1080
}


}


});



video.srcObject=stream;



video.onloadedmetadata=async()=>{


worker =
await Tesseract.createWorker("eng");


await worker.setParameters({

tessedit_char_whitelist:
"0123456789",


});



aktif=true;


scan();


};



}








async function scan(){



if(!aktif)return;



info.innerHTML =
"Memindai...";





let output =
await takePicture();





if(output){


result.innerHTML =
output;



info.innerHTML =
"Scan ulang 10 detik";



retry=0;


setTimeout(
scan,
10000
);



}else{


retry++;


info.innerHTML =
"Angka tidak terbaca, ulang "+retry;



// langsung ulang

setTimeout(

scan,

300

);


}



}









async function takePicture(){



canvas.width =
video.videoWidth;


canvas.height =
video.videoHeight;



let ctx =
canvas.getContext("2d");



ctx.drawImage(

video,

0,
0,

canvas.width,
canvas.height

);





// crop target

let crop =
document.createElement("canvas");


let cc =
crop.getContext("2d");



let w =
canvas.width*0.75;


let h =
canvas.height*0.35;



crop.width=w;

crop.height=h;



cc.drawImage(

canvas,


canvas.width*0.125,

canvas.height*0.32,

w,
h,


0,
0,

w,
h

);







// preprocessing


let img =
cc.getImageData(

0,
0,

crop.width,
crop.height

);



let d =
img.data;



for(
let i=0;
i<d.length;
i+=4
){


let gray =
(
d[i]+d[i+1]+d[i+2]
)/3;



// threshold adaptif

let value =
gray>140 ? 255 : 0;



d[i]=value;
d[i+1]=value;
d[i+2]=value;



}



cc.putImageData(
img,
0,
0
);







// upscale besar

let big =
document.createElement("canvas");


big.width =
crop.width*4;


big.height =
crop.height*4;



let bc =
big.getContext("2d");



bc.imageSmoothingEnabled=false;



bc.drawImage(

crop,

0,
0,

big.width,
big.height

);








let data =
await worker.recognize(big);




let best="";

let confidence=0;



data.data.words.forEach(w=>{


let text =
w.text.replace(/\D/g,"");



if(

text.length>0 &&

w.confidence>confidence

){


best=text;

confidence=w.confidence;


}



});






// validasi


if(

best.length>=1 &&

best.length<=6 &&

confidence>=70

){


return best;


}



return null;



}




</script>


</body>

</html>

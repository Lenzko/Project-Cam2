<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accurate Number Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
}


.camera{

position:relative;

width:95%;
max-width:700px;

margin:auto;

overflow:hidden;

border-radius:20px;

}



video{

width:100%;

}



#target{

position:absolute;

width:70%;
height:35%;

left:15%;
top:32%;

border:4px solid #00ff00;

}



#result{

font-size:35px;
margin:20px;

}



#info{

color:#00ff00;

}



button{

width:90px;
height:90px;

font-size:40px;

border-radius:50%;

}



canvas{

display:none;

}


</style>

</head>



<body>


<h2>📷 Accurate Digit Scanner</h2>



<div class="camera">


<video id="video" autoplay playsinline></video>


<div id="target"></div>


</div>



<div id="result">
-
</div>


<div id="info">
Tekan kamera
</div>



<button onclick="startCamera()">
📷
</button>



<canvas id="canvas"></canvas>




<script>


const video =
document.getElementById("video");


const canvas =
document.getElementById("canvas");


const result =
document.getElementById("result");


const info =
document.getElementById("info");



let worker;

let aktif=false;






async function startCamera(){


if(aktif)return;



let stream =
await navigator.mediaDevices.getUserMedia({

video:{


facingMode:"environment",


width:{
ideal:1920
},


height:{
ideal:1080
}


}


});



video.srcObject=stream;



video.onloadedmetadata=async()=>{


worker =
await Tesseract.createWorker("eng");



await worker.setParameters({

tessedit_char_whitelist:
"0123456789",


});



aktif=true;


scan();


};


}








async function scan(){


if(!aktif)return;



info.innerHTML =
"Ambil gambar...";




// foto asli


canvas.width =
video.videoWidth;


canvas.height =
video.videoHeight;



let ctx =
canvas.getContext("2d");



ctx.drawImage(

video,

0,
0,

canvas.width,
canvas.height

);






// crop area target


let crop =
document.createElement("canvas");


let cctx =
crop.getContext("2d");



let w =
canvas.width*0.7;


let h =
canvas.height*0.35;



crop.width=w;

crop.height=h;



cctx.drawImage(

canvas,


canvas.width*0.15,

canvas.height*0.32,

w,
h,

0,
0,

w,
h

);





// perbesar

let big =
document.createElement("canvas");


big.width =
crop.width*3;


big.height =
crop.height*3;



let b =
big.getContext("2d");


b.imageSmoothingEnabled=false;


b.drawImage(

crop,

0,
0,

big.width,
big.height

);







// OCR


let data =
await worker.recognize(big);




let angka=[];



data.data.words.forEach(w=>{


let text =
w.text.replace(/\D/g,"");



if(
text &&
w.confidence>70
){

angka.push(text);

}


});






if(angka.length){


result.innerHTML =
angka.join(" ");



}else{


result.innerHTML =
"Tidak terbaca";


}



info.innerHTML =
"Scan ulang 10 detik";



setTimeout(
scan,
10000
);


}





</script>


</body>

</html>

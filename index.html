<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digit Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
}


.camera{

position:relative;
width:95%;
max-width:700px;
margin:auto;
overflow:hidden;
border-radius:20px;

}


video{
width:100%;
}



#target{

position:absolute;

width:30%;
height:25%;

left:35%;
top:37%;

border:4px solid #00ff00;

}



#hasil{

font-size:40px;
margin:20px;

}



#info{

color:#00ff00;
font-size:18px;

}



button{

width:90px;
height:90px;

font-size:40px;

border-radius:50%;

}


canvas{
display:none;
}


</style>

</head>


<body>


<h2>📷 Digit Scanner</h2>


<div class="camera">


<video id="video" autoplay playsinline></video>


<div id="target"></div>


</div>


<div id="hasil">
-
</div>


<div id="info">
Tekan kamera
</div>


<button onclick="start()">
📷
</button>


<canvas id="canvas"></canvas>





<script>


const SHEET_URL =
"https://script.google.com/macros/s/AKfycbzUjVh_iKrtbDJ1TzoN-xdWG110bTAV8IWwVZA8qSkOYINaM1rsHXVF4eBivrU0MOUm/exec";



const video =
document.getElementById("video");


const canvas =
document.getElementById("canvas");


const hasil =
document.getElementById("hasil");


const info =
document.getElementById("info");



let worker;

let aktif=false;

let streamCamera=null;






async function start(){


if(aktif)return;


aktif=true;



worker =
await Tesseract.createWorker("eng");



await worker.setParameters({

tessedit_char_whitelist:
"0123456789"

});



info.innerHTML =
"Scanner aktif";


scan();


}








async function bukaKamera(){


streamCamera =
await navigator.mediaDevices.getUserMedia({

video:{

facingMode:"environment",

width:{
ideal:1920
},

height:{
ideal:1080
}

}

});



video.srcObject =
streamCamera;



await new Promise(r=>{

video.onloadedmetadata=r;

});


}







function matikanKamera(){


if(streamCamera){


streamCamera
.getTracks()
.forEach(t=>t.stop());


streamCamera=null;


}


video.srcObject=null;


}










async function scan(){



while(aktif){



let mulai =
Date.now();



let hasilScan=null;



// ulang sampai dapat angka valid

while(!hasilScan){



await bukaKamera();


await sleep(800);



info.innerHTML =
"🔍 Mengambil gambar...";




for(let i=0;i<3;i++){



info.innerHTML =
"🔍 Scan "+(i+1)+"/3";



let data =
await capture();



if(data){


hasilScan=data;


break;


}



await sleep(300);



}



matikanKamera();




if(!hasilScan){


info.innerHTML =
"⚠️ Tidak terbaca, ulang foto";


await sleep(500);


}



}







// hasil

hasil.innerHTML =
"Angka : "+hasilScan.angka;



info.innerHTML =
"📤 Kirim data";


sendSheet(hasilScan);




let waktu =
Date.now()-mulai;



let tunggu =
60000-waktu;


if(tunggu<1000)
tunggu=1000;



await sleep(tunggu);



info.innerHTML =
"⏳ Menunggu scan berikutnya";



}



}









async function capture(){



canvas.width =
video.videoWidth;


canvas.height =
video.videoHeight;



let ctx =
canvas.getContext("2d");



ctx.drawImage(

video,

0,

0,

canvas.width,

canvas.height

);








// area angka

let crop =
document.createElement("canvas");


let c =
crop.getContext("2d");



let w =
canvas.width*0.30;


let h =
canvas.height*0.25;



crop.width=w;

crop.height=h;



c.drawImage(

canvas,

canvas.width*0.35,

canvas.height*0.37,

w,

h,

0,

0,

w,

h

);








// grayscale + contrast ringan

let img =
c.getImageData(

0,

0,

w,

h

);


let d =
img.data;



for(
let i=0;
i<d.length;
i+=4
){


let gray =

0.299*d[i]+
0.587*d[i+1]+
0.114*d[i+2];



// contrast

gray =
(gray-128)*1.5+128;



if(gray<0)
gray=0;


if(gray>255)
gray=255;



d[i]=gray;

d[i+1]=gray;

d[i+2]=gray;


}



c.putImageData(
img,
0,
0
);








// upscale

let big =
document.createElement("canvas");



big.width =
crop.width*5;


big.height =
crop.height*5;



let b =
big.getContext("2d");


b.imageSmoothingEnabled=true;



b.drawImage(

crop,

0,

0,

big.width,

big.height

);








let data =
await worker.recognize(big);





let kandidat=[];



data.data.words.forEach(w=>{


let angka =
w.text.replace(
/[^0-9]/g,
""
);



if(angka){


kandidat.push({

angka,

confidence:w.confidence

});


}



});






kandidat.sort((a,b)=>

b.confidence-a.confidence

);






if(kandidat.length){



let best =
kandidat[0];



// validasi

if(

best.confidence>=80 &&

best.angka.length<=3 &&

best.angka!=="1"

){


return best;


}



}



return null;



}









function sendSheet(data){


fetch(

SHEET_URL,

{

method:"POST",

mode:"no-cors",

body:JSON.stringify({

angka:data.angka,

confidence:data.confidence,

waktu:new Date().toLocaleString()

})

}

);


}






function sleep(ms){

return new Promise(
r=>setTimeout(r,ms)
);

}


</script>


</body>

</html>

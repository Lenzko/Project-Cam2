<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}


.camera{

position:relative;
width:95%;
max-width:800px;
margin:auto;

}


video{

width:100%;

}



#target{

position:absolute;

width:45%;
height:20%;

left:27.5%;
top:40%;

border:4px solid #00ff00;

}



#hasil{

font-size:40px;

}



button{

font-size:40px;

width:90px;
height:90px;

border-radius:50%;

}

</style>

</head>



<body>


<h2>AI Pixel Digit Scanner</h2>



<div class="camera">

<video id="video"
autoplay
playsinline></video>


<div id="box"></div>

</div>



<h1 id="hasil">-</h1>


<button onclick="start()">
📷
</button>



<canvas id="canvas"></canvas>






<script>


const SHEET_URL =
"https://script.google.com/macros/s/AKfycbzUjVh_iKrtbDJ1TzoN-xdWG110bTAV8IWwVZA8qSkOYINaM1rsHXVF4eBivrU0MOUm/exec";



let video =
document.getElementById("video");


let canvas =
document.getElementById("canvas");


let hasil =
document.getElementById("hasil");


let worker;

let aktif=false;






async function start(){


let stream =
await navigator.mediaDevices.getUserMedia({


video:{


facingMode:"environment",

width:{
ideal:1920
},

height:{
ideal:1080
}


}

});



video.srcObject=stream;



video.onloadedmetadata=async()=>{


worker =
await Tesseract
.createWorker("eng");



await worker.setParameters({

tessedit_char_whitelist:
"0123456789"


});


aktif=true;


scan();


}


}







async function scan(){



while(aktif){



let best=null;



// ambil 3 foto voting

for(let i=0;i<3;i++){


let r =
await capture();



if(r &&
(!best ||
r.confidence>best.confidence)
){


best=r;


}



await sleep(500);


}




if(best){


hasil.innerHTML =
best.angka;



sendSheet(best);



sleep(10000);


}else{


hasil.innerHTML =
"ulang...";



sleep(300);


}



}


}









async function capture(){


canvas.width =
video.videoWidth;


canvas.height =
video.videoHeight;


let ctx =
canvas.getContext("2d");



ctx.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);



// ===== CROP KOTAK KECIL =====


let crop =
document.createElement("canvas");


let c =
crop.getContext("2d");



let w =
canvas.width*0.45;


let h =
canvas.height*0.20;



crop.width=w;

crop.height=h;



c.drawImage(

canvas,

canvas.width*0.275,

canvas.height*0.40,

w,
h,

0,
0,

w,
h

);






// ===== AMBIL PIXEL =====


let img =
c.getImageData(

0,
0,

w,
h

);


let d =
img.data;




// cari rata-rata cahaya

let total=0;

let count=0;



for(
let i=0;
i<d.length;
i+=4
){


let gray =
(
d[i]+d[i+1]+d[i+2]
)/3;


total+=gray;

count++;


}



let avg =
total/count;




// adaptive threshold

let threshold =
avg;




for(
let i=0;
i<d.length;
i+=4
){



let gray =

0.299*d[i]+
0.587*d[i+1]+
0.114*d[i+2];




// otomatis mengikuti kondisi gambar

let value =
gray > threshold
?
255
:
0;




d[i]=value;

d[i+1]=value;

d[i+2]=value;


}



c.putImageData(
img,
0,
0
);







// ===== UPSCALE 6X =====


let big =
document.createElement("canvas");


big.width =
crop.width*6;


big.height =
crop.height*6;



let b =
big.getContext("2d");



b.imageSmoothingEnabled=false;



b.drawImage(

crop,

0,
0,

big.width,
big.height

);






// OCR


let data =
await worker.recognize(big);



let best="";

let conf=0;



data.data.words.forEach(w=>{


let t =
w.text.replace(
/[^0-9]/g,
""
);



if(

t &&
w.confidence>conf

){

best=t;

conf=w.confidence;

}


});






if(

best &&
conf>=65

){


return{

angka:best,

confidence:conf

};


}



return null;


}





function sendSheet(data){


fetch(

SHEET_URL,

{

method:"POST",

body:JSON.stringify(data)

}

);


}






function sleep(ms){

return new Promise(
r=>setTimeout(r,ms)
);

}



</script>


</body>

</html>
